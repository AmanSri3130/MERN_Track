<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Groww Clone By Aman</title>

    <!-- Favicon -->
    <link rel="icon" href="https://groww.in/favicon.ico" />
  </head>

  <body
    style="
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: white;
      overflow-x: hidden;
    "
  >
 
    <nav
      style="
        width: 100%;
        height: 80px;
        background: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 70px;
        box-sizing: border-box;
        border-bottom: 1px solid #ececec;
        position: fixed;
        top: 0;
        z-index: 1000;
      "
    >
      <div style="display: flex; align-items: center; gap: 45px">
        <div style="display: flex; align-items: center; gap: 12px">
          <img
            src="download (2).png"
            style="display: flex; height: 60px; width: auto"
          />

          <h1 style="font-size: 28px; color: #202124; margin: 0">Groww</h1>
        </div>

        <div style="display: flex; gap: 35px; margin-left: 20px">
          <a
            href="#"
            style="
              text-decoration: none;
              color: #44475b;
              font-size: 17px;
              font-weight: 500;
            "
          >
            Stocks
          </a>

          <a
            href="#"
            style="
              text-decoration: none;
              color: #44475b;
              font-size: 17px;
              font-weight: 500;
            "
          >
            F&O
          </a>

          <a
            href="#"
            style="
              text-decoration: none;
              color: #44475b;
              font-size: 17px;
              font-weight: 500;
            "
          >
            Mutual Funds
          </a>

          <a
            href="#"
            style="
              text-decoration: none;
              color: #44475b;
              font-size: 17px;
              font-weight: 500;
            "
          >
            More
          </a>
        </div>
      </div>

      <div style="display: flex; align-items: center; gap: 20px">
        <div
          style="
            width: 340px;
            height: 48px;
            border: 1px solid #e6e6e6;
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            box-sizing: border-box;
            background: white;
          "
        >
          <span style="font-size: 16px"> 🔍 </span>

          <input
            type="text"
            placeholder="Search Groww....."
            style="
              border: none;
              outline: none;
              margin-left: 10px;
              width: 100%;
              font-size: 15px;
              background: transparent;
            "
          />

          <p style="color: gray; font-size: 13px">Ctrl+K</p>
        </div>

        <!-- BUTTON -->

        <button
          style="
            height: 48px;
            padding: 0 28px;
            border: none;
            border-radius: 10px;
            background: #00d09c;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            hover: {
              background: #00c896;
            }
          "
        >
          Login/Sign up
        </button>
      </div>
    </nav>

    <section
      style="
        width: 100%;
        min-height: 100vh;
        padding-top: 130px;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-sizing: border-box;
      "
    >
      <marquee
        style="border: 2px solid yellow; background-color: black; color: white; height: 20px"
      >
        welcome to Groww developed by Aman Srivastava
      </marquee>

      <h1
        style="
          font-size: 70px;
          margin-top: 20px;
          color: #44475b;
          text-align: center;
          line-height: 1;
          letter-spacing: -4px;
          margin-bottom: 0%;
        "
      >
        Groww your wealth
      </h1>

      <button
        style="
          margin-top: 35px;
          width: 180px;
          height: 60px;
          border: none;
          border-radius: 40px;
          background: #00d09c;
          color: white;
          font-size: 28px;
          font-weight: bold;
          cursor: pointer;
        "
      >
        Get started
      </button>

      <img
        src="WhatsApp Image 2026-05-14 at 12.22.09 PM.jpeg"
        alt="groww image"
        style="width: 1100px; margin-top: 40px"
      />
    </section>

    <footer
      style="
        margin-bottom: 0px;
        border: 5px;
        box-sizing: border-box;
        border-color: black;
      "
    >
      <p>welcome to grooww</p>
    </footer>
  </body>
</html>
