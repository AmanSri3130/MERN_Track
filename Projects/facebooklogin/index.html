<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in to Facebook</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main Viewport Container Grid Split -->
    <div class="main-split-container">
        
        <!-- Left Banner Column Panel View -->
        <section class="left-hero-panel">
            <div class="left-content-wrapper">
                <!-- Branding Facebook SVG Graphic Icon Vector -->
                <div class="logo-wrapper">
                    <svg viewBox="0 0 36 36" class="fb-brand-svg" fill="url(#brand-grad)">
                        <defs>
                            <linearGradient id="brand-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#1877f2" />
                                <stop offset="100%" stop-color="#0b62d8" />
                            </linearGradient>
                        </defs>
                        <path d="M20.181 35.87C29.094 34.791 36 27.202 36 18 36 8.059 27.941 0 18 0S0 8.059 0 18c0 8.313 5.667 15.303 13.303 17.316V22.89h-4.32V18h4.32v-3.725c0-4.26 2.537-6.613 6.42-6.613 1.86 0 3.805.332 3.805.332v4.183h-2.144c-2.112 0-2.77 1.31-2.77 2.655V18h4.714l-.754 4.89h-3.96v12.98z"/>
                    </svg>
                </div>

                <!-- Abstract Multi-Card Layer Complex Replication mimicking image_512319.jpg -->
                <div class="graphics-composition-matrix">
                    <!-- Floating Laughing Emoji Graphic Element Overlay -->
                    <div class="emoji-bubble floating-emoji">
                        <img src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f923/512.webp" alt="🤣">
                    </div>

                    <!-- Background Left Card Panel (House/Plant Graphic Content placeholder) -->
                    <div class="nested-ui-card bg-plant-card">
                        <div class="card-header-icon"><i class="home-icon"></i></div>
                        <img src="https://images.unsplash.com/photo-1545241047-6083a3684587?q=80&w=400&auto=format&fit=crop" class="nested-card-img" alt="Plant Decoration">
                    </div>

                    <!-- Master Central Card Layout Frame (Profile Feature Focus Accent) -->
                    <div class="nested-ui-card main-profile-frame">
                        <span class="time-stamp-badge">16:45</span>
                        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=500&auto=format&fit=crop" class="nested-card-img" alt="Featured Profile Card View">
                        <div class="interactive-status-bar">
                            <div class="progress-pill-track"></div>
                            <div class="circle-indicators-row">
                                <span class="indicator-dot"></span>
                                <span class="indicator-dot"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Secondary Bottom Left Overlay Content Card -->
                    <div class="nested-ui-card bottom-left-card">
                        <div class="card-header-icon blue-star"><i class="star-icon"></i></div>
                        <img src="https://images.unsplash.com/photo-1564982743473-4425910bf722?q=80&w=400&auto=format&fit=crop" class="nested-card-img" alt="Skate Track Content">
                        <div class="bottom-placeholder-lines">
                            <div class="line-skeleton short"></div>
                            <div class="line-skeleton long"></div>
                        </div>
                    </div>

                    <!-- Floating Heart Notification Button Bubble -->
                    <div class="heart-bubble-burst">
                        <svg class="heart-vector" viewBox="0 0 32 32">
                            <path d="M16 28.5s-12-7.223-12-14.734C4 8.761 8.012 5 12.632 5c2.94 0 5.518 1.547 6.918 3.896C20.95 6.547 23.528 5 26.468 5 31.088 5 35 8.761 35 13.766c0 7.51-12 14.734-12 14.734z" fill="#ffffff" />
                        </svg>
                    </div>

                    <!-- Rounded Profile Foreground Circle Bubble Frame Thumbnail Overlay -->
                    <div class="circle-profile-badge-overlay">
                        <div class="circle-inner-wrap">
                            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=400&auto=format&fit=crop" alt="Thumbnail Overlay Face">
                        </div>
                    </div>
                </div>

                <!-- Text Headline Callout Core Messaging -->
                <h2 class="hero-primary-headline">
                    Explore<br>the things<br><span class="blue-text-accent">you love.</span>
                </h2>
            </div>
        </section>

        <!-- Right System Input Credentials Authentication Panel Form View -->
        <section class="right-auth-panel">
            <div class="login-form-card-container">
                <h3 class="login-title-header">Log in to Facebook</h3>
                
                <form id="fb-login-form" novalidate>
                    <!-- Form Input Field Wrapper Component 1 -->
                    <div class="input-field-group-wrapper focused-blue-ring">
                        <input 
                            type="text" 
                            id="email_phone_input" 
                            placeholder=" "
                            autocomplete="username"
                            required
                        >
                        <label for="email_phone_input">Email address or mobile number</label>
                    </div>

                    <!-- Form Input Field Wrapper Component 2 -->
                    <div class="input-field-group-wrapper">
                        <input 
                            type="password" 
                            id="password_input" 
                            placeholder=" "
                            autocomplete="current-password"
                            required
                        >
                        <label for="password_input">Password</label>
                    </div>

                    <!-- Action Interactive Submissions Gateway Trigger Control Button -->
                    <button type="submit" class="auth-action-btn-submit" id="login-btn">Log in</button>
                </form>

                <!-- Navigation Recovery Reference Link -->
                <a href="#" class="forgotten-password-anchor-link">Forgotten password?</a>
                
                <hr class="card-horizontal-divider-bar">

                <!-- Creation Interface Anchor Button -->
                <div class="creation-action-wrapper">
                    <button class="btn-create-alternative-profile" id="create-account-btn">Create new account</button>
                </div>

                <!-- Corporate Meta Identity Logo Label Tag Footer Section -->
                <div class="meta-corporate-branding-tag">
                    <svg viewBox="0 0 74 14" class="meta-logo-svg">
                        <path d="M12.923 13.722V8.127c0-1.782-.605-2.61-2.128-2.61-1.393 0-2.316.892-2.316 2.502v5.703H5.163V8.127c0-1.782-.605-2.61-2.128-2.61-1.393 0-2.316.892-2.316 2.502v5.703H.014V5.132h3.111v.961c.642-.782 1.623-1.127 2.87-1.127 1.637 0 2.756.687 3.326 1.95.77-.1.748-1.95 3.313-1.95 2.155 0 3.618 1.25 3.618 3.524v5.232h-3.329zm9.053.22c-3.139 0-4.994-1.91-4.994-4.664 0-2.928 2.053-4.636 5.109-4.636 3.126 0 4.704 1.867 4.704 4.542 0 .288-.027.672-.054.851h-6.383c.15 1.401 1.056 2.115 2.247 2.115 1.155 0 1.921-.495 2.23-1.347h3.18c-.522 2.186-2.428 3.139-6.039 3.139zm.11-6.19c-.936 0-1.554.55-1.746 1.485h3.41c-.04-.908-.576-1.485-1.664-1.485zm12.395 3.684c.535 0 .869-.178.869-.536 0-.33-.28-.467-.882-.577l-1.339-.247c-2.073-.371-3.036-1.374-3.036-2.955 0-1.924 1.605-3.023 4.013-3.023 2.167 0 3.865.99 4.146 2.9h-3.193c-.161-.66-.696-1.072-1.284-1.072-.455 0-.749.192-.749.495 0 .274.24.412.762.508l1.432.261c2.154.4 3.01 1.347 3.01 2.97 0 1.965-1.552 3.125-4.254 3.125-2.582 0-4.173-1.059-4.481-3.11h3.224c.147.783.749 1.162 1.765 1.162zm8.563 2.288c-.682 0-1.217-.234-1.498-.673V13.72h-3.314V2.046h3.314V5.79c.281-.439.816-.673 1.498-.673 1.993 0 3.25 1.718 3.25 4.316s-1.257 4.289-3.25 4.289zm-.455-2.445c.803 0 1.258-.728 1.258-1.844 0-1.129-.455-1.857-1.258-1.857-.816 0-1.258.728-1.258 1.857 0 1.116.442 1.844 1.258 1.844zm11.233-3.52c0-1.264-.99-1.924-2.836-1.924-1.78 0-2.823.632-2.97 1.896h-3.224c.2-.247 1.833-3.792 6.22-3.792 3.705 0 6.13 1.58 6.13 4.372v4.864c0 .852.16 1.25.482 1.525V13.72c-.415.027-.856-.055-1.164-.275-.415-.288-.616-.769-.642-1.484-.522 1.017-1.525 1.759-3.144 1.759-2.287 0-3.865-1.347-3.865-3.325 0-2.076 1.753-3.078 4.67-3.078h2.342c.001-.002.001-.002.001-.002zm-2.342 2.377c-1.124 0-1.686.371-1.686 1.017 0 .563.455.935 1.164.935.91 0 1.713-.605 1.713-1.43v-.522h-1.191z" fill="#1c2b33" />
                        <path d="M68.75 0h-5.464a4.444 4.444 0 00-4.444 4.444v4.444c0 2.455 1.99 4.445 4.444 4.445h5.464a4.444 4.444 0 004.445-4.445V4.444A4.444 4.444 0 0068.75 0zm2.083 8.889a2.083 2.083 0 01-2.083 2.083h-5.464a2.083 2.083 0 01-2.084-2.083V4.444c0-1.15.933-2.083 2.084-2.083h5.464a2.083 2.083 0 012.083 2.083v4.444z" fill="#0064e0"/>
                        <path d="M68.802 3.284h-4.887a.38.38 0 00-.38.38v2.12c0 .21.17.38.38.38h4.887c.21 0 .38-.17.38-.38v-2.12a.38 0 00-.38-.38z" fill="#0064e0"/>
                    </svg>
                </div>
            </div>
        </section>

    </div>

    <!-- Multi-Language Horizontal Fixed Baseline Footer Strip -->
    <footer class="localized-languages-strip">
        <div class="footer-languages-row">
            <span class="lang-node dynamic-active">English (UK)</span>
            <span class="lang-node">मराठी</span>
            <span class="lang-node">हिन्दी</span>
            <span class="lang-node">اردو</span>
            <span class="lang-node">ગુજરાતી</span>
            <span class="lang-node">ಕನ್ನಡ</span>
            <span class="lang-node">ਪੰਜਾਬੀ</span>
            <span class="lang-node view-more-languages">More languages...</span>
        </div>
    </footer>

</body>
</html>
