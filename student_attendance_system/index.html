<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="attendance-card">
        
        <h1 class="system-title">Student Attendance System</h1>

        <div class="action-bar">
            <input 
                type="text" 
                id="studentNameInput" 
                placeholder="Enter Student Name" 
                class="name-input"
            />
            <button id="addStudentBtn" class="btn btn-add">Add Student</button>
            <button id="saveAttendanceBtn" class="btn btn-save">Save Attendance</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th class="col-id">ID</th>
                        <th class="col-name">Student Name</th>
                        <th class="col-status">Status</th>
                        <th class="col-toggle">Attendance</th>
                        <th class="col-action">Action</th>
                    </tr>
                </thead>
                <tbody id="attendanceTableBody">
                    </tbody>
            </table>
        </div>

        <div class="stats-summary">
            <div>Total Students: <span id="totalStudents">0</span></div>
            <div>Present: <span id="totalPresent">0</span></div>
            <div>Absent: <span id="totalAbsent">0</span></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
